name: bgp-testbed
topology:
  nodes:
    router1:
      kind: linux
      image: frrouting/frr:latest
      binds:
      - ./configs/frr1.conf:/etc/frr/frr.conf
      - ../configs/daemons:/etc/frr/daemons
    router2:
      kind: linux
      image: frrouting/frr:latest
      binds:
      - ./configs/frr2.conf:/etc/frr/frr.conf
      - ../configs/daemons:/etc/frr/daemons
    router3:
      kind: linux
      image: frrouting/frr:latest
      binds:
      - ./configs/frr3.conf:/etc/frr/frr.conf
      - ../configs/daemons:/etc/frr/daemons
    router4:
      kind: linux
      image: frrouting/frr:latest
      binds:
      - ./configs/frr4.conf:/etc/frr/frr.conf
      - ../configs/daemons:/etc/frr/daemons
    router5:
      kind: linux
      image: frrouting/frr:latest
      binds:
      - ./configs/frr5.conf:/etc/frr/frr.conf
      - ../configs/daemons:/etc/frr/daemons
    router6:
      kind: linux
      image: frrouting/frr:latest
      binds:
      - ./configs/frr6.conf:/etc/frr/frr.conf
      - ../configs/daemons:/etc/frr/daemons
    censor1:
      kind: linux
      image: frrouting/frr:latest
      binds:
      - ./configs/censor1.conf:/etc/frr/frr.conf
      - ../configs/daemons:/etc/frr/daemons
    censor2:
      kind: linux
      image: frrouting/frr:latest
      binds:
      - ./configs/censor2.conf:/etc/frr/frr.conf
      - ../configs/daemons:/etc/frr/daemons
  links:
  - endpoints:
    - router1:eth1
    - router2:eth1
  - endpoints:
    - router1:eth2
    - router3:eth1
  - endpoints:
    - router2:eth2
    - router3:eth2
  - endpoints:
    - router2:eth3
    - router4:eth1
  - endpoints:
    - router3:eth3
    - router4:eth2
  - endpoints:
    - router2:eth4
    - censor1:eth1
  - endpoints:
    - router3:eth4
    - censor2:eth1
  - endpoints:
    - router4:eth3
    - router5:eth1
  - endpoints:
    - router2:eth5
    - router6:eth1
  - endpoints:
    - router4:eth4
    - router6:eth2
