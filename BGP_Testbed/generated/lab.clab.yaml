name: bgp-testbed
topology:
  nodes:
    router1:
      kind: linux
      image: frrouting/frr:latest
      binds:
      - ./configs/frr1.conf:/etc/frr/frr.conf
      - ../configs/daemons:/etc/frr/daemons
    router2:
      kind: linux
      image: frrouting/frr:latest
      binds:
      - ./configs/frr2.conf:/etc/frr/frr.conf
      - ../configs/daemons:/etc/frr/daemons
    router3:
      kind: linux
      image: frrouting/frr:latest
      binds:
      - ./configs/frr3.conf:/etc/frr/frr.conf
      - ../configs/daemons:/etc/frr/daemons
    censor1:
      kind: linux
      image: frrouting/frr:latest
      binds:
      - ./configs/censor1.conf:/etc/frr/frr.conf
      - ../configs/daemons:/etc/frr/daemons
    rpki-validator:
      kind: linux
      image: cloudflare/gortr
      cmd: -bind :3323 -cache /roas.json -verify=false -checktime=false
      binds:
      - ./configs/roas.json:/roas.json:ro
  links:
  - endpoints:
    - router1:eth1
    - router2:eth1
  - endpoints:
    - router2:eth2
    - router3:eth1
  - endpoints:
    - router1:eth2
    - censor1:eth1
