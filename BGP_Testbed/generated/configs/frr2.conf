frr defaults traditional
!
hostname router2
!
interface eth1
 ip address 10.0.0.2/30
!
interface eth2
 ip address 10.0.1.1/30
!
interface lo
 ip address 192.168.2.1/24
!
ip prefix-list PFX-ROUTER4 seq 5 permit 192.168.4.0/24
!
route-map RM-IN-ROUTER1 permit 10
 match ip address prefix-list PFX-ROUTER4
 set origin incomplete
!

route-map RM-IN-ROUTER1 permit 20
!
router bgp 65002
 bgp router-id 2.2.2.2
 no bgp ebgp-requires-policy
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.1.2 remote-as 65003
 !
 address-family ipv4 unicast
  network 192.168.2.0/24
  neighbor 10.0.0.1 activate
  neighbor 10.0.1.2 activate
  neighbor 10.0.0.1 route-map RM-IN-ROUTER1 in
 exit-address-family
!
!
