frr defaults traditional
!
hostname router2
!
interface eth1
 ip address 10.0.0.2/30
!
interface eth2
 ip address 10.0.2.1/30
!
interface eth3
 ip address 10.0.4.2/30
!
interface eth4
 ip address 10.0.7.2/30
!
interface eth5
 ip address 10.0.10.2/30
!
interface eth6
 ip address 10.0.13.2/30
!
interface eth7
 ip address 10.0.16.2/30
!
interface lo
 ip address 192.168.2.1/24
!
router bgp 65002
 bgp router-id 2.2.2.2
 no bgp ebgp-requires-policy
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.2.2 remote-as 65003
 neighbor 10.0.4.1 remote-as 65004
 neighbor 10.0.7.1 remote-as 65006
 neighbor 10.0.10.1 remote-as 65007
 neighbor 10.0.13.1 remote-as 65009
 neighbor 10.0.16.1 remote-as 65010
 !
 address-family ipv4 unicast
  network 192.168.2.0/24
  neighbor 10.0.0.1 activate
  neighbor 10.0.2.2 activate
  neighbor 10.0.4.1 activate
  neighbor 10.0.7.1 activate
  neighbor 10.0.10.1 activate
  neighbor 10.0.13.1 activate
  neighbor 10.0.16.1 activate
 exit-address-family
!
!
