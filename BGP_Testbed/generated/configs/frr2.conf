frr defaults traditional
!
hostname AS2
!
interface eth1
 ip address 10.0.0.2/30
!
interface eth2
 ip address 10.0.2.1/30
!
interface eth3
 ip address 10.0.4.2/30
!
interface eth4
 ip address 10.0.7.2/30
!
interface eth5
 ip address 10.0.10.2/30
!
interface eth6
 ip address 10.0.13.2/30
!
interface eth7
 ip address 10.0.16.2/30
!
interface lo
 ip address 192.168.2.1/24
!
ip prefix-list PFX-CONE seq 5 permit 192.168.2.0/24
 ip prefix-list PFX-CONE seq 10 permit 192.168.10.0/24
 ip prefix-list PFX-CONE seq 15 permit 192.168.11.0/24
 ip prefix-list PFX-CONE seq 20 permit 192.168.12.0/24
 ip prefix-list PFX-CONE seq 25 permit 192.168.14.0/24
 ip prefix-list PFX-CONE seq 30 permit 192.168.15.0/24
 ip prefix-list PFX-CONE seq 35 permit 192.168.16.0/24
 ip prefix-list PFX-CONE seq 40 permit 192.168.17.0/24
 ip prefix-list PFX-CONE seq 45 permit 192.168.18.0/24
 ip prefix-list PFX-CONE seq 50 permit 192.168.20.0/24
 ip prefix-list PFX-CONE seq 55 permit 192.168.21.0/24
 ip prefix-list PFX-CONE seq 60 permit 192.168.22.0/24
 ip prefix-list PFX-CONE seq 65 permit 192.168.23.0/24
 ip prefix-list PFX-CONE seq 70 permit 192.168.24.0/24
 ip prefix-list PFX-CONE seq 75 permit 192.168.25.0/24
 ip prefix-list PFX-CONE seq 80 permit 192.168.27.0/24
 ip prefix-list PFX-CONE seq 85 permit 192.168.28.0/24
 ip prefix-list PFX-CONE seq 90 permit 192.168.30.0/24
 ip prefix-list PFX-CONE seq 95 permit 192.168.4.0/24
 ip prefix-list PFX-CONE seq 100 permit 192.168.6.0/24
 ip prefix-list PFX-CONE seq 105 permit 192.168.7.0/24
 ip prefix-list PFX-CONE seq 110 permit 192.168.9.0/24
!
ip community-list standard CL-NON-CUSTOMER permit 65000:200
ip community-list standard CL-NON-CUSTOMER permit 65000:300
ip community-list standard CL-CUSTOMER permit 65000:100
!
route-map RM-ORIGIN-CUSTOMER permit 10
 set community 65000:100 additive
!
route-map RM-IN-AS7 permit 20
 set local-preference 200
 set community 65000:100 additive
!
route-map RM-IN-AS4 permit 20
 set local-preference 200
 set community 65000:100 additive
!
route-map RM-IN-AS6 permit 20
 set local-preference 200
 set community 65000:100 additive
!
route-map RM-IN-AS9 permit 20
 set local-preference 200
 set community 65000:100 additive
!
route-map RM-IN-AS3 permit 20
 set local-preference 100
 set community 65000:200 additive
!
route-map RM-IN-AS10 permit 20
 set local-preference 200
 set community 65000:100 additive
!
route-map RM-IN-CENSOR1 permit 20
 set local-preference 100
 set community 65000:200 additive
!
!
route-map RM-OUT-AS3 permit 10
 match ip address prefix-list PFX-CONE
!
route-map RM-OUT-AS3 deny 20
!
route-map RM-OUT-CENSOR1 permit 10
 match ip address prefix-list PFX-CONE
!
route-map RM-OUT-CENSOR1 deny 20
!
router bgp 65002
 bgp router-id 2.2.2.2
 no bgp ebgp-requires-policy
 neighbor 10.0.0.1 remote-as 65901
 neighbor 10.0.2.2 remote-as 65003
 neighbor 10.0.4.1 remote-as 65004
 neighbor 10.0.7.1 remote-as 65006
 neighbor 10.0.10.1 remote-as 65007
 neighbor 10.0.13.1 remote-as 65009
 neighbor 10.0.16.1 remote-as 65010
 !
 address-family ipv4 unicast
  network 192.168.2.0/24 route-map RM-ORIGIN-CUSTOMER
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 send-community both
  neighbor 10.0.2.2 activate
  neighbor 10.0.2.2 send-community both
  neighbor 10.0.4.1 activate
  neighbor 10.0.4.1 send-community both
  neighbor 10.0.7.1 activate
  neighbor 10.0.7.1 send-community both
  neighbor 10.0.10.1 activate
  neighbor 10.0.10.1 send-community both
  neighbor 10.0.13.1 activate
  neighbor 10.0.13.1 send-community both
  neighbor 10.0.16.1 activate
  neighbor 10.0.16.1 send-community both
  neighbor 10.0.10.1 route-map RM-IN-AS7 in
  neighbor 10.0.4.1 route-map RM-IN-AS4 in
  neighbor 10.0.7.1 route-map RM-IN-AS6 in
  neighbor 10.0.13.1 route-map RM-IN-AS9 in
  neighbor 10.0.2.2 route-map RM-IN-AS3 in
  neighbor 10.0.16.1 route-map RM-IN-AS10 in
  neighbor 10.0.0.1 route-map RM-IN-CENSOR1 in
  neighbor 10.0.2.2 route-map RM-OUT-AS3 out
  neighbor 10.0.0.1 route-map RM-OUT-CENSOR1 out
 exit-address-family
!
!
