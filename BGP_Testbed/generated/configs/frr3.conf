frr defaults traditional
!
hostname router3
!
interface eth1
 ip address 10.0.1.2/30
!
interface eth2
 ip address 10.0.2.2/30
!
interface eth3
 ip address 10.0.4.1/30
!
interface eth4
 ip address 10.0.6.1/30
!
interface lo
 ip address 192.168.3.1/24
!
ip prefix-list PFX-ROUTER6 seq 5 permit 192.168.6.0/24
!
route-map RM-IN-ROUTER4 permit 10
 match ip address prefix-list PFX-ROUTER6
 set local-preference 300
!
route-map RM-IN-ROUTER4 permit 20
!
router bgp 65003
 bgp router-id 3.3.3.3
 no bgp ebgp-requires-policy
 neighbor 10.0.1.1 remote-as 65001
 neighbor 10.0.2.1 remote-as 65002
 neighbor 10.0.4.2 remote-as 65004
 neighbor 10.0.6.2 remote-as 65902
 !
 address-family ipv4 unicast
  network 192.168.3.0/24
  neighbor 10.0.1.1 activate
  neighbor 10.0.2.1 activate
  neighbor 10.0.4.2 activate
  neighbor 10.0.6.2 activate
  neighbor 10.0.4.2 route-map RM-IN-ROUTER4 in
 exit-address-family
!
!
