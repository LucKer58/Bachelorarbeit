frr defaults traditional
!
hostname router1
!
interface eth1
 ip address 10.0.0.1/30
!
interface eth2
 ip address 10.0.1.1/30
!
interface eth3
 ip address 10.0.3.2/30
!
interface eth4
 ip address 10.0.5.2/30
!
interface eth5
 ip address 10.0.9.2/30
!
interface eth6
 ip address 10.0.11.2/30
!
interface eth7
 ip address 10.0.15.2/30
!
interface lo
 ip address 192.168.1.1/24
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp ebgp-requires-policy
 neighbor 10.0.0.2 remote-as 65002
 neighbor 10.0.1.2 remote-as 65003
 neighbor 10.0.3.1 remote-as 65004
 neighbor 10.0.5.1 remote-as 65005
 neighbor 10.0.9.1 remote-as 65007
 neighbor 10.0.11.1 remote-as 65008
 neighbor 10.0.15.1 remote-as 65010
 !
 address-family ipv4 unicast
  network 192.168.1.0/24
  neighbor 10.0.0.2 activate
  neighbor 10.0.1.2 activate
  neighbor 10.0.3.1 activate
  neighbor 10.0.5.1 activate
  neighbor 10.0.9.1 activate
  neighbor 10.0.11.1 activate
  neighbor 10.0.15.1 activate
 exit-address-family
!
!
