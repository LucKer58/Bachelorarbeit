name: bgp-testbed

topology:
  nodes:
    router1:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ../configs/frr1.conf:/etc/frr/frr.conf
        - ../configs/daemons:/etc/frr/daemons
    router2:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ../configs/frr2.conf:/etc/frr/frr.conf
        - ../configs/daemons:/etc/frr/daemons
    router3:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ../configs/frr3.conf:/etc/frr/frr.conf
        - ../configs/daemons:/etc/frr/daemons
    router4:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ../configs/frr4.conf:/etc/frr/frr.conf
        - ../configs/daemons:/etc/frr/daemons
    
    exabgp-censor:
      kind: linux
      image: exabgp-censor:latest
      binds:
        - ../configs/exabgp-censor.conf:/root/exabgp.conf
      exec:
        - ip addr add 10.0.5.2/30 dev eth1
        - ip link set dev eth1 up

  links:
    - endpoints: ["router1:eth1", "router2:eth1"]
    - endpoints: ["router1:eth2", "router3:eth1"]
    - endpoints: ["router2:eth2", "router3:eth2"]
    - endpoints: ["router2:eth3", "router4:eth1"]
    - endpoints: ["router3:eth3", "router4:eth2"]
    - endpoints: ["router2:eth4", "exabgp-censor:eth1"]
