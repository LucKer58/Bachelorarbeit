name: bgp-testbed

# ========== ROUTER ==========
# router1 = Opfer (Inland)
# router2 = Transit
# router3 = Ziel (Ausland)
routers:
- router1
- router2
- router3

# ========== LINKS ==========
links:
- [router1, router2]
- [router2, router3]
- [router1, censor1]

# ========== ZENSOREN ==========
censors:
- name: censor1
  target_router: router3
  attack_type: hijack
  prefix_type: exact

# ========== POLICIES ==========
policies:
# Wir erhöhen künstlich die BGP-Priorität für den legitimen Pfad über router2
- node: router1
  neighbor: router2
  target_node: router3
  local_preference: 300

# ERWARTETES RESULTAT:
# router1 wählt router2 (den echten Weg). Obwohl der Zensor näher ist (1 Hop),
# schlägt die künstliche Local Preference von 300 den AS-Path-Längen-Check.
# Der Hijack ist fehlgeschlagen, Nutzer surfen sicher.