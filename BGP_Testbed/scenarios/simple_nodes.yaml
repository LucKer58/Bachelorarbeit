name: bgp-testbed

# ========== ROUTER ==========
# router1 = Inlands-Router (Bürger des Landes)
# router2 = Grenz-Router (Transit ins Ausland)
# router3 = Ziel-Router im Ausland (Das Opfer, z.B. Twitter)
routers:
- router1
- router2
- router3

# ========== LINKS ==========
links:
- [router1, router2]   # Inland ist mit der Grenze verbunden
- [router2, router3]   # Grenze ist mit dem Ausland verbunden
- [router1, censor1]   # Zensor hängt am Inlands-Router

# ========== ZENSOREN ==========
censors:
- name: censor1
  target_router: router3
  attack_type: as_path_poisoning
  prefix_type: subprefix
  poison_asn: 65002    # Die ASN des Grenz-Routers (router2)

