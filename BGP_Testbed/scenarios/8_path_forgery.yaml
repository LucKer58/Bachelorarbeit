name: bgp-testbed

# ========== ROUTER ==========
# router1 = Inlands-Router (Opfer)
# router2 = Transit-Router
# router3 = Ziel-Router im Ausland (Das eigentliche Ziel)
routers:
- router1
- router2
- router3

# ========== LINKS ==========
links:
- [router1, router2]
- [router2, router3]
- [router1, censor1]

# ========== ZENSOREN ==========
censors:
- name: censor1
  target_router: router3
  # AS Path Forgery: Der Zensor behauptet, die Route geht über bestimmte, oft vertrauenswürdige ASNs
  attack_type: as_path_forgery
  prefix_type: exact              # Wir kündigen ein /24 Netz an
  fake_path: "65004 65003"        # Optional: Der gefälschte AS-Pfad, den der Zensor mitschickt

# ========== POLICIES ==========
policies: []

# ERWARTETES RESULTAT:
# Censor1 kündigt das Präfix von router3 (192.168.3.0/24) mit einem gefälschten AS-Pfad an.
# Während Origin Spoofing nur die letzte ASN fälscht, um RPKI zu umgehen, 
# täuscht Path Forgery den gesamten Pfad vor (hier die ASNs 65004 und 65003),
# um beispielsweise nach Pfaden filternde Firewalls oder BGP-Policies zu umgehen.