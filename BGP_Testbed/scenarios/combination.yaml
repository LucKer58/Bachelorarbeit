# Vereinfachte Topologie-Definition
# Das Script berechnet alles automatisch basierend auf Router-Namen

name: bgp-testbed

# ========== ROUTER ==========
# Nur Namen angeben - alles andere wird automatisch berechnet
routers:
- AS1
- AS2
- AS3
- AS4
- AS5
- AS6

# ========== LINKS ==========
# Einfach angeben welche Router verbunden sind
links:
- [AS1, AS2]
- [AS1, AS3]
- [AS2, AS3]
- [AS2, AS4]
- [AS3, AS4]
- [AS2, censor1]
- [AS3, censor2]
- [AS4, AS5]
- [AS2, AS6]
- [AS4, AS6]


# ========== ZENSOREN ==========
# ExaBGP-basierte Angreifer
censors:
- name: censor1
  target_router: AS1
  attack_type: hijack
  prefix_type: subprefix

- name: censor2
  target_router: AS5
  attack_type: hijack
  prefix_type: exact

# ========== POLICIES ==========
# Policies für BGP Attribute wie Local Preference (optional)
policies:
- node: AS3
  neighbor: censor2
  target_node: AS5
  prepend_asn: 65902
  prepend_count: 3

- node: AS3
  neighbor: AS4
  target_node: AS6
  local_preference: 300

