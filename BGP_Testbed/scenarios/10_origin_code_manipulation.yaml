name: bgp-testbed

# ========== ROUTER ==========
# AS1 = Opfer (Inland)
# AS2 = Transit
# AS3 = Ziel (Ausland)
routers:
- AS1
- AS2
- AS3
- AS4

# ========== LINKS ==========
links:
- [AS1, AS2]
- [AS2, AS3]
- [AS1, censor1]
- [AS3, AS4]

# ========== ZENSOREN ==========
censors:
- name: censor1
  target_router: AS4
  attack_type: hijack
  prefix_type: exact

# ========== POLICIES ==========
policies:
- node: AS2              # Der normale Router, der die Manipulation vornimmt
  neighbor: AS1       # Der Nachbar, von dem die Route kommt
  target_node: AS4       # Das betroffene Ziel-Präfix
  origin_code: incomplete    # Setzt den Origin Code auf 'incomplete' (?) oder 'igp' (i)

# ERWARTETES RESULTAT:
# AS1 wählt Censor1. Beide bieten ein /24 Prefix an, aber der Zensor 
# ist näher (1 Hop über censor1 vs. 2 Hops über AS2->AS3).
# Die Zensur gewinnt "natürlich" durch den kürzeren AS-Path.