name: bgp-testbed

# ========== ROUTER ==========
# router1 = Opfer (Inland)
# router2 = Transit
# router3 = Ziel (Ausland)
routers:
- router1
- router2
- router3

# ========== LINKS ==========
links:
- [router1, router2]
- [router2, router3]
- [router1, censor1]

# ========== ZENSOREN ==========
censors:
- name: censor1
  target_router: router3
  attack_type: subprefix_hijack

# ========== POLICIES ==========
policies: []

# ERWARTETES RESULTAT:
# router1 wählt Censor1, weil /25 spezifischer ist als /24 (Longest Prefix Match).
# Zensur ist zu 100% erfolgreich, unabhängig  von der Pfadlänge.