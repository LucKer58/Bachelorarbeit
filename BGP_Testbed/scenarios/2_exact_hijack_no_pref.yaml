name: bgp-testbed

# ========== ROUTER ==========
# router1 = Opfer (Inland)
# router2 = Transit
# router3 = Ziel (Ausland)
routers:
- router1
- router2
- router3

# ========== LINKS ==========
links:
- [router1, router2]
- [router2, router3]
- [router1, censor1]

# ========== ZENSOREN ==========
censors:
- name: censor1
  target_router: router3
  attack_type: hijack
  prefix_type: exact

# ========== POLICIES ==========
policies: []

# ERWARTETES RESULTAT:
# router1 wählt Censor1. Beide bieten ein /24 Prefix an, aber der Zensor 
# ist näher (1 Hop über censor1 vs. 2 Hops über router2->router3).
# Die Zensur gewinnt "natürlich" durch den kürzeren AS-Path.