global:
  config:
    as: 65002
    router-id: 2.2.2.2

neighbors:
  - config:
      neighbor-address: 10.0.0.1
      peer-as: 65001
    transport:
      config:
        local-address: 10.0.0.2
    afi-safis:
      - config:
          afi-safi-name: ipv4-unicast
  - config:
      neighbor-address: 10.0.2.2
      peer-as: 65003
    transport:
      config:
        local-address: 10.0.2.1
    afi-safis:
      - config:
          afi-safi-name: ipv4-unicast
  - config:
      neighbor-address: 10.0.3.2
      peer-as: 65004
    transport:
      config:
        local-address: 10.0.3.1
    afi-safis:
      - config:
          afi-safi-name: ipv4-unicast
  - config:
      neighbor-address: 10.0.5.2
      peer-as: 65999
    transport:
      config:
        local-address: 10.0.5.1
    afi-safis:
      - config:
          afi-safi-name: ipv4-unicast

defined-sets:
  prefix-sets:
    - prefix-set-name: local-network
      prefix-list:
        - ip-prefix: 192.168.2.0/24

policy-definitions:
  - name: export-local
    statements:
      - conditions:
          match-prefix-set:
            prefix-set: local-network
        actions:
          route-disposition: accept-route
